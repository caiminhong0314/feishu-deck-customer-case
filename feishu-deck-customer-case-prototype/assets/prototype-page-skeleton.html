<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Feishu Customer Case Prototype</title>
  <style>
    :root {
      --deck-bg: #071023;
      --blue: #1456f0;
      --text: #eef5ff;
      --muted: #9fb0d2;
      --line: rgba(121, 158, 255, .28);
      --product-text: #1f2329;
      --product-muted: #646a73;
      --product-border: #dee0e3;
      font-family: LarkCircular, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #02040a; overflow: hidden; }
    .stage {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      transform-origin: center;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 10%, rgba(34,72,174,.35), transparent 34%),
        radial-gradient(circle at 88% 0%, rgba(18,96,102,.24), transparent 30%),
        linear-gradient(126deg, #081333 0%, #061026 48%, #020409 100%);
    }
    .content {
      position: absolute;
      inset: 0;
      padding: 58px 112px 34px;
      display: grid;
      grid-template-rows: 128px 104px minmax(0, 732px);
      gap: 12px;
    }
    .header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 170px;
      align-items: start;
      column-gap: 42px;
      padding-top: 8px;
    }
    .title {
      margin: 0;
      max-width: 1370px;
      font-size: 50px;
      line-height: 1.12;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
    }
    .subtitle {
      margin-top: 10px;
      max-width: 1420px;
      font-size: 30px;
      line-height: 1.22;
      font-weight: 500;
      color: rgba(239,246,255,.92);
    }
    .logo { justify-self: end; width: 160px; height: 50px; object-fit: contain; margin-top: 8px; }
    .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
    .metric {
      min-height: 96px;
      border: 1px solid rgba(106,149,255,.45);
      border-radius: 10px;
      padding: 18px 28px;
      display: grid;
      grid-template-columns: 148px minmax(0, 1fr);
      align-items: center;
      gap: 22px;
      background: linear-gradient(135deg, rgba(29,91,235,.92), rgba(13,45,117,.78));
    }
    .metric strong { font-size: 44px; line-height: 1; font-weight: 800; color: #fff; white-space: nowrap; }
    .metric span {
      min-width: 0;
      padding-left: 22px;
      border-left: 1px solid rgba(224,236,255,.2);
      font-size: 20px;
      line-height: 1.25;
      font-weight: 650;
      color: #fff;
    }
    .metric small { display: block; margin-top: 4px; font-size: 15px; line-height: 1.32; color: rgba(223,235,255,.84); }
    .main { display: grid; grid-template-columns: 560px minmax(0, 1fr); gap: 28px; min-height: 0; }
    .case-panel {
      min-height: 0;
      border: 1px solid rgba(103,143,241,.34);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(15,31,68,.86), rgba(8,19,45,.88));
      overflow: hidden;
    }
    .left-panel { padding: 22px 24px; display: grid; grid-template-rows: auto 1fr auto; gap: 14px; }
    .right-panel { padding: 18px; display: grid; grid-template-rows: auto 1fr; gap: 12px; }
    .tag {
      display: inline-flex;
      align-items: center;
      height: 34px;
      padding: 0 16px;
      border: 1px solid rgba(255,190,110,.52);
      border-radius: 999px;
      background: rgba(255,146,58,.12);
      color: #ffd0a0;
      font-size: 18px;
      font-weight: 700;
    }
    .panel-title, .right-title { margin: 8px 0 0; font-size: 26px; line-height: 1.14; font-weight: 760; color: #fff; }
    .right-head { min-height: 70px; display: grid; grid-template-columns: minmax(0, 372px) minmax(0, 1fr); gap: 18px; align-items: end; }
    .flow-tabs { display: flex; gap: 8px; height: 58px; justify-content: flex-end; }
    .flow-tab {
      width: 150px;
      border: 1px solid rgba(138,165,218,.26);
      border-radius: 10px;
      padding: 8px 12px;
      background: rgba(255,255,255,.08);
      color: #dce8ff;
      text-align: left;
      font: inherit;
      cursor: pointer;
    }
    .flow-tab.active { border-color: rgba(79,141,255,.86); background: linear-gradient(135deg, rgba(36,97,226,.92), rgba(18,47,122,.86)); }
    .flow-tab .num { display: block; margin-bottom: 5px; font-size: 12px; line-height: 1; color: #8eb7ff; font-weight: 800; }
    .flow-tab b { display: block; font-size: 17px; line-height: 1.08; font-weight: 760; white-space: nowrap; }
    .flow-tab small { display: block; margin-top: 4px; font-size: 11px; line-height: 1; color: rgba(218,230,255,.72); white-space: nowrap; }
    .product-shell {
      min-height: 0;
      border: 1px solid rgba(222,224,227,.92);
      border-radius: 12px;
      background: #fff;
      color: var(--product-text);
      overflow: hidden;
      display: grid;
      grid-template-rows: 50px 1fr;
      position: relative;
    }
    .product-top {
      height: 50px;
      padding: 0 18px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
      border-bottom: .5px solid var(--product-border);
      background: #fff;
    }
    .product-main { min-height: 0; background: #f8f9fa; }
    .demo-action {
      height: 30px;
      padding: 0 12px;
      border-radius: 8px;
      border: 1px solid var(--product-border);
      background: #fff;
      color: var(--product-text);
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }
    .demo-action.primary { border-color: var(--blue); background: var(--blue); color: #fff; }
    .zoom-btn {
      position: absolute;
      right: 18px;
      bottom: 16px;
      height: 36px;
      padding: 0 15px;
      border: 0;
      border-radius: 999px;
      background: rgba(31,35,41,.78);
      color: #fff;
      font-weight: 650;
      cursor: zoom-in;
    }
    .footer { display: none; }
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 100;
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
      display: grid;
      place-items: center;
      background: rgba(0,0,0,.82);
      transition: opacity .15s ease;
    }
    .lightbox.open { visibility: visible; opacity: 1; pointer-events: auto; }
    .lightbox .clone { width: min(90vw, 1720px); height: min(86vh, 900px); border-radius: 12px; overflow: hidden; background: #fff; cursor: zoom-out; }
  </style>
</head>
<body>
  <main class="stage" id="stage">
    <section class="content">
      <header class="header">
        <div>
          <h1 class="title">客户名｜标题即结论，说明业务变化</h1>
          <div class="subtitle">一句话说明输入、系统处理、输出和业务价值。</div>
        </div>
        <img class="logo" src="assets/lark-logo.png" alt="飞书" />
      </header>
      <section class="metrics">
        <div class="metric"><strong>指标</strong><span>指标含义<small>指标解释</small></span></div>
        <div class="metric"><strong>指标</strong><span>指标含义<small>指标解释</small></span></div>
        <div class="metric"><strong>指标</strong><span>指标含义<small>指标解释</small></span></div>
      </section>
      <section class="main">
        <aside class="case-panel left-panel">
          <div><span class="tag">Before 真实证据</span><h2 class="panel-title">过去：痛点短句</h2></div>
          <div><!-- Before pain / evidence goes here. --></div>
          <div><!-- Left conclusion goes here. --></div>
        </aside>
        <section class="case-panel right-panel">
          <div class="right-head">
            <div><span class="tag">After 飞书解决方案</span><h2 class="right-title">现在：机制短句</h2></div>
            <div class="flow-tabs">
              <button class="flow-tab active" data-step="step1"><span class="num">01</span><b>步骤一</b><small>状态变化</small></button>
              <button class="flow-tab" data-step="step2"><span class="num">02</span><b>步骤二</b><small>状态变化</small></button>
              <button class="flow-tab" data-step="step3"><span class="num">03</span><b>步骤三</b><small>状态变化</small></button>
              <button class="flow-tab" data-step="step4"><span class="num">04</span><b>步骤四</b><small>状态变化</small></button>
            </div>
          </div>
          <div class="product-shell" id="productShell">
            <div class="product-top">
              <div>产品 / 工作区名称</div>
              <div></div>
              <div><button class="demo-action">演示当前</button><button class="demo-action primary">自动演示</button></div>
            </div>
            <div class="product-main"><!-- Embedded Feishu/Lark product surface goes here. --></div>
            <button class="zoom-btn" id="zoomProduct" type="button">点击放大</button>
          </div>
        </section>
      </section>
    </section>
  </main>
  <div class="lightbox" id="lightbox" aria-hidden="true"></div>
  <script>
    const stage = document.getElementById('stage');
    function fitStage() {
      const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
      stage.style.transform = `translate(-50%, -50%) scale(${scale})`;
    }
    window.addEventListener('resize', fitStage);
    fitStage();

    const lightbox = document.getElementById('lightbox');
    const productShell = document.getElementById('productShell');
    document.getElementById('zoomProduct').addEventListener('click', () => {
      const clone = productShell.cloneNode(true);
      clone.removeAttribute('id');
      clone.querySelectorAll('.zoom-btn').forEach(btn => btn.remove());
      clone.classList.add('clone');
      lightbox.innerHTML = '';
      lightbox.appendChild(clone);
      lightbox.classList.add('open');
      lightbox.setAttribute('aria-hidden', 'false');
    });
    function closeLightbox() {
      lightbox.classList.remove('open');
      lightbox.setAttribute('aria-hidden', 'true');
      setTimeout(() => { if (!lightbox.classList.contains('open')) lightbox.innerHTML = ''; }, 160);
    }
    lightbox.addEventListener('click', closeLightbox);
    window.addEventListener('keydown', event => { if (event.key === 'Escape') closeLightbox(); });
  </script>
</body>
</html>
